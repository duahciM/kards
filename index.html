<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>前线·直接拖拽版</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a2a1f;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px;
            touch-action: pan-y;
        }
        .game-container {
            max-width: 480px;
            width: 100%;
            background: #2d3e2d;
            border-radius: 28px;
            padding: 14px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            border: 2px solid #6b8c5c;
            position: relative;
            z-index: 5;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #3e5a3e;
            padding: 6px 8px;
            border-radius: 36px;
            margin-bottom: 12px;
            color: #f0f4d0;
            border: 1px solid #8aa87d;
            font-weight: bold;
        }
        .player-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 0.75rem;
            background: #2b472b;
            padding: 5px 10px;
            border-radius: 28px;
            min-width: 100px;
        }
        .player-badge.right {
            align-items: flex-end;
        }
        .hp-command {
            display: flex;
            gap: 6px;
            margin-top: 2px;
        }
        .hp { background: #721717; padding: 3px 8px; border-radius: 18px; color: #ffdba0; font-size: 0.9rem; }
        .command { background: #2a4f6e; padding: 3px 8px; border-radius: 18px; color: #b6e2ff; font-size: 0.9rem; }
        .turn-indicator {
            background: #dba44b; color: #1d3a1d; padding: 5px 12px; border-radius: 36px;
            font-size: 0.8rem; white-space: nowrap;
        }
        .battlefield {
            background: #527a52; border-radius: 24px; padding: 12px 6px; border: 2px solid #9bba8b;
            margin-bottom: 14px;
        }
        .row {
            display: flex; align-items: center; justify-content: space-between; margin: 6px 0; min-height: 100px;
        }
        .zone {
            flex: 1; background: #3f613f; border-radius: 18px; padding: 6px 3px; margin: 0 3px;
            border: 1px solid #b1cf9a; box-shadow: inset 0 2px 5px #1e3a1e;
            display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-items: center;
            min-height: 95px; transition: background-color 0.2s;
        }
        .zone.drop-highlight {
            background-color: #7fa87f; border: 3px solid #ffd966;
        }
        .zone-label {
            font-size: 0.6rem; color: #dcedb9; text-align: center; width: 100%; margin-bottom: 3px;
            text-transform: uppercase; font-weight: 600;
        }
        /* 总部目标 */
        .hq-target {
            background: #8b6e4b; border-radius: 30px; padding: 10px 18px; font-size: 1rem;
            border: 2px solid #f3c26b; color: #2a2a0a; box-shadow: 0 2px 0 #5e3e1e;
            display: inline-block; margin: 5px; cursor: grab; transition: 0.1s;
            text-align: center; font-weight: bold; min-width: 120px;
            touch-action: none;
        }
        .hq-target.drop-highlight {
            background: #d9a066; border-color: #fff5b0; transform: scale(1.05);
        }
        .hq-target.disabled {
            opacity: 0.5; pointer-events: none;
        }
        /* 单位卡片 */
        .unit-card {
            background: #f3e9c0; border: 2px solid #7b5f3a; border-radius: 18px; padding: 8px 4px;
            min-width: 85px; max-width: 95px; font-size: 0.75rem; text-align: center; color: #2d2d0a;
            box-shadow: 2px 3px 0 #4f673a; position: relative; margin: 3px 0; transition: all 0.1s;
            cursor: grab; touch-action: none;
        }
        .unit-card.dragging {
            opacity: 0.3;
        }
        .unit-card.drop-highlight {
            border: 4px solid #f44336; background: #ffe4e4; cursor: grabbing;
        }
        .unit-name { font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.8rem; }
        .unit-stats { display: flex; justify-content: space-around; margin: 5px 0 3px; font-weight: bold; }
        .unit-abilities { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; font-size: 0.65rem; }
        .ability-tag { background: #5a7c4a; color: #faf9da; border-radius: 12px; padding: 3px 6px; }
        /* 手牌区 */
        .hand-area {
            background: #4a684a; border-radius: 30px; padding: 10px 6px; border: 2px solid #c7ddaf;
            margin-bottom: 10px;
        }
        .hand-title { color: #fcf9cf; margin-left: 8px; margin-bottom: 5px; font-weight: 600; font-size: 0.8rem; }
        .hand-cards {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center;
            min-height: 95px;
        }
        .hand-card {
            background: #e3d6b5; border: 2px solid #826e42; border-radius: 22px; padding: 10px 5px;
            min-width: 90px; text-align: center; font-size: 0.75rem; font-weight: bold;
            box-shadow: 0 4px 0 #5e7342; cursor: grab; transition: 0.05s linear;
            touch-action: none;
        }
        .hand-card.dragging {
            opacity: 0.3;
            transform: scale(0.95);
        }
        .hand-card.disabled {
            opacity: 0.4; pointer-events: none;
        }
        .hand-cost { background: #4f614a; color: white; border-radius: 20px; padding: 3px 8px; display: inline-block; margin-top: 4px; }
        /* 拖拽克隆 */
        .drag-clone {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            width: 90px;
            background: #e3d6b5;
            border: 3px solid #f9a825;
            border-radius: 24px;
            padding: 12px 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 8px 10px rgba(0,0,0,0.5);
            opacity: 0.9;
        }
        .end-turn-btn {
            background: #bc8f4f; border: none; border-radius: 40px; padding: 16px 20px; font-size: 1.3rem;
            font-weight: bold; color: #1e3a1e; width: 100%; margin-top: 12px; box-shadow: 0 5px 0 #6e4f2b;
            cursor: pointer; text-align: center; touch-action: manipulation;
        }
        .end-turn-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #6e4f2b; }
        .footer-info { display: flex; justify-content: space-between; margin: 8px 0; color: #d3e0b0; font-size: 0.7rem; }
        .hq-row {
            display: flex; justify-content: space-between; margin: 8px 0;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer"></div>

<script>
    (function() {
        // ----- 单位类 -----
        class Unit {
            constructor(id, name, type, attack, health, cost, abilities = []) {
                this.id = id;
                this.name = name;
                this.type = type;
                this.attack = attack;
                this.maxHealth = health;
                this.health = health;
                this.cost = cost;
                this.abilities = abilities;
                this.owner = null;
                this.position = null;
                this.moved = false;
                this.attacked = false;
                this.vigilUsed = false;
                this.deployedThisTurn = false;
            }
            hasAbility(ab) { return this.abilities.includes(ab); }
            canMove() {
                if (this.moved) return false;
                if (this.type === 'infantry' && this.attacked) return false;
                return true;
            }
            canAttack() {
                if (this.attacked) return false;
                if (this.type === 'infantry' && this.moved) return false;
                return true;
            }
            resetTurn() {
                this.moved = false;
                this.attacked = false;
                this.vigilUsed = false;
                this.deployedThisTurn = false;
            }
        }

        // ----- 卡库 -----
        const cardLibrary = [
            { name: '步枪兵', type: 'infantry', attack: 2, health: 3, cost: 1, abilities: [] },
            { name: '突击步兵', type: 'infantry', attack: 2, health: 2, cost: 1, abilities: ['闪击'] },
            { name: 'M4坦克', type: 'tank', attack: 3, health: 4, cost: 2, abilities: [] },
            { name: '谢尔曼', type: 'tank', attack: 4, health: 3, cost: 2, abilities: ['闪击'] },
            { name: '榴弹炮', type: 'artillery', attack: 3, health: 2, cost: 2, abilities: [] },
            { name: '护卫兵', type: 'infantry', attack: 1, health: 4, cost: 1, abilities: ['守护'] },
            { name: '狙击手', type: 'infantry', attack: 3, health: 1, cost: 2, abilities: ['伏击'] },
            { name: '烟雾弹兵', type: 'infantry', attack: 1, health: 2, cost: 1, abilities: ['烟幕'] }
        ];

        // ----- 状态 -----
        let gameState = {
            players: [
                { id: 0, hp: 20, maxCommand: 1, command: 1, hand: [] },
                { id: 1, hp: 20, maxCommand: 1, command: 1, hand: [] }
            ],
            currentPlayer: 0,
            frontlineOwner: null,
            units: [],
            nextUnitId: 1000,
        };

        // 拖拽状态
        let dragState = {
            active: false,
            type: null,          // 'hand' 或 'unit'
            startCardIndex: -1,
            startUnitId: null,
            startClientX: 0,
            startClientY: 0,
            cloneElement: null,
            originalElement: null,
        };

        // ----- 辅助函数 -----
        function getPlayer(pId) { return gameState.players[pId]; }
        function hasUnitInFront(owner) {
            return gameState.units.some(u => u.owner === owner && u.position === 'front');
        }
        function updateFrontlineOwner() {
            const p0front = hasUnitInFront(0);
            const p1front = hasUnitInFront(1);
            gameState.frontlineOwner = (p0front && !p1front) ? 0 : (!p0front && p1front) ? 1 : null;
        }

        // 移动合法性
        function canMoveToFront(unit) {
            if (!unit || unit.owner !== gameState.currentPlayer) return false;
            if (unit.position === 'front') return false;
            if (!unit.canMove()) return false;
            if (hasUnitInFront(1 - gameState.currentPlayer)) return false;
            if (getPlayer(gameState.currentPlayer).command < 1) return false;
            return true;
        }

        // 攻击合法性
        function canAttackTarget(attacker, targetType, targetUnit = null) {
            if (!attacker || attacker.owner !== gameState.currentPlayer) return false;
            if (!attacker.canAttack()) return false;
            if (getPlayer(gameState.currentPlayer).command < 1) return false;

            if (targetUnit && targetUnit.hasAbility('烟幕') && !targetUnit.moved && !targetUnit.attacked && !targetUnit.deployedThisTurn) {
                return false;
            }

            if (attacker.type === 'artillery') {
                return true;
            }

            if (targetType === 'headquarter') {
                return attacker.position === 'front';
            }

            if (!targetUnit) return false;
            if (attacker.position === 'support') {
                return targetUnit.position === 'front' && targetUnit.owner !== attacker.owner;
            }
            if (attacker.position === 'front') {
                return targetUnit.owner !== attacker.owner;
            }
            return false;
        }

        // 守护检查
        function isProtectedByGuard(targetUnit, attacker) {
            if (attacker.type === 'artillery') return false;
            if (!targetUnit) return false;
            const opponent = 1 - attacker.owner;
            const guards = gameState.units.filter(u => u.owner === opponent && u.hasAbility('守护') && u.health > 0);
            for (let g of guards) {
                if (g.position === targetUnit.position) return true;
                if (g.position === 'front' && targetUnit.position === 'support') return true;
                if (g.position === 'support' && targetUnit.position === 'front') return true;
            }
            return false;
        }

        function removeDeadUnits() {
            gameState.units = gameState.units.filter(u => u.health > 0);
            updateFrontlineOwner();
        }

        function handleVigil(target, attacker) {
            if (target.hasAbility('伏击') && !target.vigilUsed && target.health > 0) {
                target.vigilUsed = true;
                attacker.health -= target.attack;
                return attacker.health <= 0;
            }
            return false;
        }

        function handleCounter(attacker, target) {
            if (attacker.type === 'artillery') return;
            if (target.health > 0) {
                attacker.health -= target.attack;
            }
        }

        // ----- 动作执行 -----
        function deployCard(playerId, cardIndex) {
            const player = gameState.players[playerId];
            if (playerId !== gameState.currentPlayer) return false;
            const card = player.hand[cardIndex];
            if (!card) return false;
            if (player.command < card.cost) return false;

            player.command -= card.cost;
            const newUnit = new Unit(
                gameState.nextUnitId++,
                card.name,
                card.type,
                card.attack,
                card.health,
                card.cost,
                [...card.abilities]
            );
            newUnit.owner = playerId;
            newUnit.position = 'support';
            if (newUnit.hasAbility('闪击')) {
                newUnit.deployedThisTurn = true;
            } else {
                newUnit.moved = true;
                newUnit.attacked = true;
                newUnit.deployedThisTurn = true;
            }
            gameState.units.push(newUnit);
            player.hand.splice(cardIndex, 1);
            updateFrontlineOwner();
            render();
            return true;
        }

        function moveUnit(unitId) {
            const unit = gameState.units.find(u => u.id === unitId);
            if (!unit || !canMoveToFront(unit)) return false;
            getPlayer(gameState.currentPlayer).command -= 1;
            unit.moved = true;
            unit.position = 'front';
            updateFrontlineOwner();
            render();
            return true;
        }

        function attackAction(attackerId, targetType, targetUnitId = null) {
            const attacker = gameState.units.find(u => u.id === attackerId);
            if (!attacker || attacker.owner !== gameState.currentPlayer) return false;

            let targetUnit = null;
            if (targetType === 'unit' && targetUnitId !== null) {
                targetUnit = gameState.units.find(u => u.id === targetUnitId);
                if (!targetUnit) return false;
            }

            if (!canAttackTarget(attacker, targetType, targetUnit)) return false;

            if (targetType === 'unit' && targetUnit) {
                if (isProtectedByGuard(targetUnit, attacker)) {
                    alert('目标被守护单位保护！');
                    return false;
                }
            }
            if (targetType === 'headquarter') {
                const opponent = 1 - attacker.owner;
                const guards = gameState.units.filter(u => u.owner === opponent && u.hasAbility('守护') && u.position === 'front');
                if (guards.length > 0 && attacker.type !== 'artillery') {
                    alert('敌方前线守护单位保护总部！');
                    return false;
                }
            }

            getPlayer(gameState.currentPlayer).command -= 1;
            attacker.attacked = true;

            if (targetType === 'unit' && targetUnit) {
                const attackerDied = handleVigil(targetUnit, attacker);
                if (attackerDied) {
                    removeDeadUnits();
                    render();
                    return true;
                }
                targetUnit.health -= attacker.attack;
                if (attacker.type !== 'artillery' && targetUnit.health > 0) {
                    handleCounter(attacker, targetUnit);
                }
                removeDeadUnits();
            } else if (targetType === 'headquarter') {
                const opponentId = 1 - attacker.owner;
                gameState.players[opponentId].hp -= attacker.attack;
            }

            if (gameState.players[0].hp <= 0) alert('玩家1胜利！');
            else if (gameState.players[1].hp <= 0) alert('玩家0胜利！');

            updateFrontlineOwner();
            render();
            return true;
        }

        function endTurn() {
            const next = 1 - gameState.currentPlayer;
            gameState.currentPlayer = next;
            const player = gameState.players[next];
            if (player.maxCommand < 12) player.maxCommand++;
            player.command = player.maxCommand;
            gameState.units.forEach(u => u.resetTurn());
            render();
        }

        // ----- 拖拽逻辑 -----
        function setupDragDrop() {
            // 手牌拖拽
            document.querySelectorAll('.hand-card:not(.disabled)').forEach(card => {
                card.removeEventListener('touchstart', onDragStart);
                card.addEventListener('touchstart', onDragStart, { passive: false });
            });
            // 己方单位拖拽
            document.querySelectorAll('.unit-card').forEach(card => {
                const unitId = card.dataset.unitId;
                if (unitId) {
                    const unit = gameState.units.find(u => u.id == unitId);
                    if (unit && unit.owner === gameState.currentPlayer) {
                        card.removeEventListener('touchstart', onDragStart);
                        card.addEventListener('touchstart', onDragStart, { passive: false });
                    } else {
                        card.style.cursor = 'default';
                    }
                }
            });
        }

        function onDragStart(e) {
            e.preventDefault();
            if (gameState.currentPlayer !== 0) return; // 只有玩家0回合可操作

            const card = e.currentTarget;
            let type, index, unitId;

            if (card.classList.contains('hand-card')) {
                type = 'hand';
                index = card.dataset.index;
                if (index === undefined) return;
                const player = gameState.players[0];
                if (player.command < player.hand[index]?.cost) {
                    alert('指挥点不足');
                    return;
                }
            } else if (card.classList.contains('unit-card')) {
                type = 'unit';
                unitId = card.dataset.unitId;
                if (!unitId) return;
                const unit = gameState.units.find(u => u.id == unitId);
                if (!unit || unit.owner !== gameState.currentPlayer) return;
            } else {
                return;
            }

            const touch = e.touches[0];
            dragState.active = true;
            dragState.type = type;
            if (type === 'hand') {
                dragState.startCardIndex = parseInt(index);
            } else {
                dragState.startUnitId = parseInt(unitId);
            }
            dragState.startClientX = touch.clientX;
            dragState.startClientY = touch.clientY;
            dragState.originalElement = card;
            dragState.cloneElement = createClone(card, touch.clientX, touch.clientY);

            card.classList.add('dragging');
            highlightValidTargets(); // 初始高亮

            document.addEventListener('touchmove', onDragMove, { passive: false });
            document.addEventListener('touchend', onDragEnd, { passive: false });
            document.addEventListener('touchcancel', onDragCancel, { passive: false });
        }

        function createClone(original, x, y) {
            const clone = document.createElement('div');
            clone.className = 'drag-clone';
            clone.innerHTML = original.innerHTML;
            clone.style.left = x + 'px';
            clone.style.top = y + 'px';
            document.body.appendChild(clone);
            return clone;
        }

        function highlightValidTargets() {
            // 清除之前的highligh
            document.querySelectorAll('.drop-highlight').forEach(el => el.classList.remove('drop-highlight'));

            if (!dragState.active) return;

            if (dragState.type === 'hand') {
                // 手牌只能部署到己方支援线
                const mySupport = document.getElementById('mySupportZone');
                if (mySupport) mySupport.classList.add('drop-highlight');
            } else if (dragState.type === 'unit') {
                const unit = gameState.units.find(u => u.id === dragState.startUnitId);
                if (!unit) return;

                // 移动目标：前线（如果可移动）
                if (canMoveToFront(unit)) {
                    const frontlineZone = document.getElementById('frontlineZone');
                    if (frontlineZone) frontlineZone.classList.add('drop-highlight');
                }

                // 攻击目标：敌方单位
                gameState.units.forEach(other => {
                    if (other.owner !== unit.owner && canAttackTarget(unit, 'unit', other)) {
                        const el = document.querySelector(`.unit-card[data-unit-id="${other.id}"]`);
                        if (el) el.classList.add('drop-highlight');
                    }
                });

                // 攻击目标：敌方总部
                if (canAttackTarget(unit, 'headquarter')) {
                    const enemyHQ = document.querySelector('.hq-target[data-hq="enemy"]');
                    if (enemyHQ) enemyHQ.classList.add('drop-highlight');
                }
            }
        }

        function onDragMove(e) {
            if (!dragState.active) return;
            e.preventDefault();
            const touch = e.touches[0];
            if (dragState.cloneElement) {
                dragState.cloneElement.style.left = touch.clientX + 'px';
                dragState.cloneElement.style.top = touch.clientY + 'px';
            }
            // 可选：动态更新高亮（但不必须）
        }

        function onDragEnd(e) {
            if (!dragState.active) {
                cleanDrag();
                return;
            }
            e.preventDefault();

            const touch = e.changedTouches[0];
            if (!touch) {
                cleanDrag();
                return;
            }

            const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
            let actionPerformed = false;

            if (targetEl) {
                if (dragState.type === 'hand') {
                    // 部署
                    if (targetEl.classList.contains('zone') && targetEl.id === 'mySupportZone') {
                        actionPerformed = deployCard(0, dragState.startCardIndex);
                    }
                } else if (dragState.type === 'unit') {
                    const attackerId = dragState.startUnitId;
                    // 移动
                    if (targetEl.classList.contains('zone') && targetEl.id === 'frontlineZone' && targetEl.classList.contains('drop-highlight')) {
                        actionPerformed = moveUnit(attackerId);
                    }
                    // 攻击敌方单位
                    else if (targetEl.classList.contains('unit-card') && targetEl.classList.contains('drop-highlight')) {
                        const targetId = targetEl.dataset.unitId;
                        if (targetId) {
                            actionPerformed = attackAction(attackerId, 'unit', parseInt(targetId));
                        }
                    }
                    // 攻击敌方总部
                    else if (targetEl.classList.contains('hq-target') && targetEl.classList.contains('drop-highlight') && targetEl.dataset.hq === 'enemy') {
                        actionPerformed = attackAction(attackerId, 'headquarter');
                    }
                }
            }

            cleanDrag();

            if (!actionPerformed) {
                // 无效拖拽，仅刷新（拖拽已清理）
                render();
            }
        }

        function onDragCancel(e) {
            cleanDrag();
        }

        function cleanDrag() {
            if (dragState.originalElement) {
                dragState.originalElement.classList.remove('dragging');
            }
            if (dragState.cloneElement) {
                dragState.cloneElement.remove();
            }
            document.querySelectorAll('.drop-highlight').forEach(el => el.classList.remove('drop-highlight'));
            document.removeEventListener('touchmove', onDragMove);
            document.removeEventListener('touchend', onDragEnd);
            document.removeEventListener('touchcancel', onDragCancel);
            dragState.active = false;
        }

        // ----- 渲染 -----
        function render() {
            const container = document.getElementById('gameContainer');
            const p0 = gameState.players[0];
            const p1 = gameState.players[1];
            const current = gameState.currentPlayer;

            let html = `
                <div class="player-header">
                    <div class="player-badge">
                        <span>🔰 P1</span>
                        <div class="hp-command"><span class="hp">❤️${p0.hp}</span><span class="command">⚡${p0.command}/${p0.maxCommand}</span></div>
                    </div>
                    <div class="turn-indicator">${current === 0 ? '▶️你的回合' : '⏸️敌方回合'}</div>
                    <div class="player-badge right">
                        <span>🔰 P2</span>
                        <div class="hp-command"><span class="hp">❤️${p1.hp}</span><span class="command">⚡${p1.command}/${p1.maxCommand}</span></div>
                    </div>
                </div>
                <div class="hq-row">
                    <div class="hq-target" data-hq="friend" style="background:#2d6e2d; border-color:#9bba8b;">🏛️我方总部</div>
                    <div class="hq-target ${current === 0 ? '' : 'disabled'}" data-hq="enemy" style="background:#8b4b4b; border-color:#f3c26b;">🏛️敌方总部</div>
                </div>
                <div class="battlefield">
                    <div class="row">
                        <div class="zone" id="enemySupportZone">
                            <div class="zone-label">敌方支援线</div>
                            ${renderUnitsInZone(1, 'support')}
                        </div>
                    </div>
                    <div class="row">
                        <div class="zone" style="flex:2; background:#6f936f" id="frontlineZone">
                            <div class="zone-label">前线 · ${gameState.frontlineOwner === 0 ? '🔴我方' : (gameState.frontlineOwner === 1 ? '🔵敌方' : '⚫无人')}</div>
                            ${renderUnitsInZone(0, 'front')}
                            ${renderUnitsInZone(1, 'front')}
                        </div>
                    </div>
                    <div class="row">
                        <div class="zone" id="mySupportZone">
                            <div class="zone-label">我方支援线</div>
                            ${renderUnitsInZone(0, 'support')}
                        </div>
                    </div>
                </div>
                <div class="hand-area">
                    <div class="hand-title">📋 敌方手牌 (P2)</div>
                    <div class="hand-cards" id="handEnemy">
                        ${renderHand(1, false)}
                    </div>
                </div>
                <div class="hand-area">
                    <div class="hand-title">📋 我方手牌 (P1) ${current === 0 ? '⚡可操作' : '⏸️等待'}</div>
                    <div class="hand-cards" id="handFriendly">
                        ${renderHand(0, true)}
                    </div>
                </div>
                <button class="end-turn-btn" id="endTurnBtn">⏭️ 结束回合</button>
                <div class="footer-info">
                    <span>⚡移动/攻击消耗1</span>
                    <span>🎴直接拖拽单位/手牌</span>
                </div>
            `;

            container.innerHTML = html;

            document.getElementById('endTurnBtn').addEventListener('click', endTurn);
            setupDragDrop();
        }

        function renderUnitsInZone(owner, zone) {
            const units = gameState.units.filter(u => u.owner === owner && u.position === zone);
            if (units.length === 0) return '<div style="color:#aaa; padding:10px;">— 空 —</div>';
            return units.map(u => renderUnitCard(u)).join('');
        }

        function renderUnitCard(unit) {
            const abTags = unit.abilities.map(ab => `<span class="ability-tag">${ab}</span>`).join('');
            return `
                <div class="unit-card" data-unit-id="${unit.id}">
                    <div class="unit-name">${unit.name}</div>
                    <div class="unit-stats">⚔️${unit.attack} ❤️${unit.health}</div>
                    <div class="unit-abilities">${abTags}</div>
                </div>
            `;
        }

        function renderHand(playerId, isActive) {
            const player = gameState.players[playerId];
            if (!player.hand.length) return '<div>手牌空</div>';
            return player.hand.map((card, idx) => {
                const disabled = (playerId !== gameState.currentPlayer) ? 'disabled' : (player.command < card.cost ? 'disabled' : '');
                return `
                    <div class="hand-card ${disabled}" data-index="${idx}">
                        <div>${card.name}</div>
                        <div>⚔️${card.attack} ❤️${card.health}</div>
                        <div class="hand-cost">⚡${card.cost}</div>
                        <div style="font-size:0.65rem;">${card.abilities.join(' ')}</div>
                    </div>
                `;
            }).join('');
        }

        // 初始化
        function initGame() {
            gameState = {
                players: [
                    { id: 0, hp: 20, maxCommand: 1, command: 1, hand: [] },
                    { id: 1, hp: 20, maxCommand: 1, command: 1, hand: [] }
                ],
                currentPlayer: 0,
                frontlineOwner: null,
                units: [],
                nextUnitId: 1000,
            };
            for (let p = 0; p < 2; p++) {
                for (let i = 0; i < 5; i++) {
                    const cardTemplate = { ...cardLibrary[Math.floor(Math.random() * cardLibrary.length)] };
                    gameState.players[p].hand.push(cardTemplate);
                }
            }
            render();
        }

        initGame();
    })();
</script>
</body>
</html>

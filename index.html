<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>前线·完全拖拽版</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a2a1f;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            touch-action: pan-y;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: #2d3e2d;
            border-radius: 32px;
            padding: 16px 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            border: 2px solid #6b8c5c;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #3e5a3e;
            padding: 8px 10px;
            border-radius: 40px;
            margin-bottom: 12px;
            color: #f0f4d0;
            border: 1px solid #8aa87d;
            font-weight: bold;
            text-shadow: 1px 1px 0 #1e3a1e;
        }
        .player-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 0.8rem;
            background: #2b472b;
            padding: 6px 12px;
            border-radius: 30px;
            min-width: 110px;
        }
        .player-badge.right {
            align-items: flex-end;
        }
        .hp-command {
            display: flex;
            gap: 8px;
            margin-top: 2px;
        }
        .hp {
            background: #721717;
            padding: 4px 10px;
            border-radius: 20px;
            color: #ffdba0;
            font-size: 1rem;
        }
        .command {
            background: #2a4f6e;
            padding: 4px 10px;
            border-radius: 20px;
            color: #b6e2ff;
        }
        .turn-indicator {
            background: #dba44b;
            color: #1d3a1d;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        /* 总部攻击目标区 */
        .headquarter-target {
            background: #8b6e4b;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 1.1rem;
            border: 2px solid #f3c26b;
            color: #2a2a0a;
            margin-left: 5px;
            cursor: grab;
            box-shadow: 0 2px 0 #5e3e1e;
            transition: 0.1s;
        }
        .headquarter-target.drop-highlight {
            background: #d9a066;
            border-color: #fff5b0;
            transform: scale(1.05);
        }
        .battlefield {
            background: #527a52;
            border-radius: 28px;
            padding: 14px 8px;
            border: 2px solid #9bba8b;
            margin-bottom: 16px;
        }
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0;
            min-height: 95px;
        }
        .zone {
            flex: 1;
            background: #3f613f;
            border-radius: 20px;
            padding: 8px 4px;
            margin: 0 3px;
            border: 1px solid #b1cf9a;
            box-shadow: inset 0 2px 5px #1e3a1e;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            align-items: center;
            min-height: 85px;
            transition: background-color 0.2s;
        }
        .zone.drop-highlight {
            background-color: #7fa87f;
            border: 3px solid #ffd966;
        }
        .zone-label {
            font-size: 0.65rem;
            color: #dcedb9;
            text-align: center;
            width: 100%;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .unit-card {
            background: #f3e9c0;
            border: 2px solid #7b5f3a;
            border-radius: 18px;
            padding: 6px 4px;
            min-width: 75px;
            max-width: 85px;
            font-size: 0.7rem;
            text-align: center;
            color: #2d2d0a;
            box-shadow: 2px 3px 0 #4f673a;
            position: relative;
            margin: 2px 0;
            transition: all 0.1s;
            cursor: grab;
            touch-action: none;
        }
        .unit-card.dragging {
            opacity: 0.3;
        }
        .unit-name {
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .unit-stats {
            display: flex;
            justify-content: space-around;
            margin: 5px 0 3px;
            font-weight: bold;
        }
        .unit-abilities {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            font-size: 0.6rem;
            color: #3f6123;
        }
        .ability-tag {
            background: #5a7c4a;
            color: #faf9da;
            border-radius: 12px;
            padding: 2px 6px;
        }
        .hand-area {
            background: #4a684a;
            border-radius: 40px;
            padding: 14px 8px;
            border: 2px solid #c7ddaf;
        }
        .hand-title {
            color: #fcf9cf;
            margin-left: 10px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .hand-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }
        .hand-card {
            background: #e3d6b5;
            border: 2px solid #826e42;
            border-radius: 24px;
            padding: 12px 8px;
            min-width: 90px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #5e7342;
            cursor: grab;
            transition: 0.05s linear;
            touch-action: none;
        }
        .hand-card.dragging {
            opacity: 0.3;
            transform: scale(0.95);
        }
        .hand-card.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .hand-cost {
            background: #4f614a;
            color: white;
            border-radius: 20px;
            padding: 3px 8px;
            display: inline-block;
            margin-top: 5px;
        }
        .drag-clone {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            width: 90px;
            background: #e3d6b5;
            border: 3px solid #f9a825;
            border-radius: 24px;
            padding: 12px 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 8px 10px rgba(0,0,0,0.5);
            opacity: 0.9;
        }
        .end-turn-btn {
            background: #bc8f4f;
            border: none;
            border-radius: 40px;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e3a1e;
            width: 100%;
            margin-top: 18px;
            box-shadow: 0 5px 0 #6e4f2b;
            cursor: pointer;
            text-align: center;
        }
        .end-turn-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6e4f2b;
        }
        .footer-info {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            color: #d3e0b0;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer"></div>

<script>
    (function() {
        // ----- 单位类 -----
        class Unit {
            constructor(id, name, type, attack, health, cost, abilities = []) {
                this.id = id;
                this.name = name;
                this.type = type;
                this.attack = attack;
                this.maxHealth = health;
                this.health = health;
                this.cost = cost;
                this.abilities = abilities;
                this.owner = null;
                this.position = null; // 'support' 或 'front'
                this.moved = false;
                this.attacked = false;
                this.vigilUsed = false;
                this.deployedThisTurn = false;
            }
            hasAbility(ab) { return this.abilities.includes(ab); }
            canMove() {
                if (this.moved) return false;
                if (this.type === 'infantry' && this.attacked) return false;
                return true;
            }
            canAttack() {
                if (this.attacked) return false;
                if (this.type === 'infantry' && this.moved) return false;
                return true;
            }
            resetTurn() {
                this.moved = false;
                this.attacked = false;
                this.vigilUsed = false;
                this.deployedThisTurn = false;
            }
        }

        // ----- 卡库 -----
        const cardLibrary = [
            { name: '步枪兵', type: 'infantry', attack: 2, health: 3, cost: 1, abilities: [] },
            { name: '突击步兵', type: 'infantry', attack: 2, health: 2, cost: 1, abilities: ['闪击'] },
            { name: 'M4坦克', type: 'tank', attack: 3, health: 4, cost: 2, abilities: [] },
            { name: '谢尔曼', type: 'tank', attack: 4, health: 3, cost: 2, abilities: ['闪击'] },
            { name: '榴弹炮', type: 'artillery', attack: 3, health: 2, cost: 2, abilities: [] },
            { name: '护卫兵', type: 'infantry', attack: 1, health: 4, cost: 1, abilities: ['守护'] },
            { name: '狙击手', type: 'infantry', attack: 3, health: 1, cost: 2, abilities: ['伏击'] },
            { name: '烟雾弹兵', type: 'infantry', attack: 1, health: 2, cost: 1, abilities: ['烟幕'] }
        ];

        // ----- 全局状态 -----
        let gameState = {
            players: [
                { id: 0, hp: 20, maxCommand: 1, command: 1, hand: [] },
                { id: 1, hp: 20, maxCommand: 1, command: 1, hand: [] }
            ],
            currentPlayer: 0,
            frontlineOwner: null,
            units: [],
            nextUnitId: 1000,
        };

        // ----- 拖拽状态 -----
        let dragState = {
            active: false,
            type: null,          // 'hand' 或 'unit'
            startCardIndex: -1,   // 手牌索引
            startUnitId: null,    // 单位ID
            startClientX: 0,
            startClientY: 0,
            cloneElement: null,
            originalElement: null,
        };

        // ----- 辅助函数 -----
        function getPlayer(pId) { return gameState.players[pId]; }
        function hasUnitInFront(owner) {
            return gameState.units.some(u => u.owner === owner && u.position === 'front');
        }
        function updateFrontlineOwner() {
            const p0front = hasUnitInFront(0);
            const p1front = hasUnitInFront(1);
            if (p0front && !p1front) gameState.frontlineOwner = 0;
            else if (!p0front && p1front) gameState.frontlineOwner = 1;
            else gameState.frontlineOwner = null;
        }

        // 移动合法性
        function canMoveToFront(unit) {
            if (!unit || unit.owner !== gameState.currentPlayer) return false;
            if (unit.position === 'front') return false;
            if (!unit.canMove()) return false;
            const opponent = 1 - gameState.currentPlayer;
            if (hasUnitInFront(opponent)) return false;
            if (getPlayer(gameState.currentPlayer).command < 1) return false;
            return true;
        }

        // 攻击合法性（不检查指挥点）
        function canAttackTarget(attacker, targetType, targetUnit = null) {
            if (!attacker || attacker.owner !== gameState.currentPlayer) return false;
            if (!attacker.canAttack()) return false;

            if (targetUnit && targetUnit.hasAbility('烟幕') && !targetUnit.moved && !targetUnit.attacked && !targetUnit.deployedThisTurn) {
                return false;
            }

            if (attacker.type === 'artillery') {
                if (targetType === 'headquarter') return true;
                return true;
            }

            if (targetType === 'headquarter') {
                return attacker.position === 'front';
            }

            if (!targetUnit) return false;
            if (attacker.position === 'support') {
                return targetUnit.position === 'front' && targetUnit.owner !== attacker.owner;
            }
            if (attacker.position === 'front') {
                return targetUnit.owner !== attacker.owner;
            }
            return false;
        }

        // 守护检查
        function isProtectedByGuard(targetUnit, attacker) {
            if (attacker.type === 'artillery') return false;
            if (!targetUnit) return false;
            const opponent = 1 - attacker.owner;
            const guards = gameState.units.filter(u => u.owner === opponent && u.hasAbility('守护') && u.health > 0);
            for (let g of guards) {
                if (g.position === targetUnit.position) return true;
                if (g.position === 'front' && targetUnit.position === 'support') return true;
                if (g.position === 'support' && targetUnit.position === 'front') return true;
            }
            return false;
        }

        function removeDeadUnits() {
            gameState.units = gameState.units.filter(u => u.health > 0);
            updateFrontlineOwner();
        }

        function handleVigil(target, attacker) {
            if (target.hasAbility('伏击') && !target.vigilUsed && target.health > 0) {
                target.vigilUsed = true;
                attacker.health -= target.attack;
                return attacker.health <= 0;
            }
            return false;
        }

        function handleCounter(attacker, target) {
            if (attacker.type === 'artillery') return;
            if (target.health > 0) {
                attacker.health -= target.attack;
            }
        }

        // ----- 动作 -----
        function deployCard(playerId, cardIndex) {
            const player = gameState.players[playerId];
            if (playerId !== gameState.currentPlayer) return false;
            const card = player.hand[cardIndex];
            if (!card) return false;
            if (player.command < card.cost) return false;

            player.command -= card.cost;
            const newUnit = new Unit(
                gameState.nextUnitId++,
                card.name,
                card.type,
                card.attack,
                card.health,
                card.cost,
                [...card.abilities]
            );
            newUnit.owner = playerId;
            newUnit.position = 'support';
            if (newUnit.hasAbility('闪击')) {
                newUnit.deployedThisTurn = true;
            } else {
                newUnit.moved = true;
                newUnit.attacked = true;
                newUnit.deployedThisTurn = true;
            }

            gameState.units.push(newUnit);
            player.hand.splice(cardIndex, 1);
            updateFrontlineOwner();
            render();
            return true;
        }

        function moveUnit(unitId) {
            const unit = gameState.units.find(u => u.id === unitId);
            if (!unit || !canMoveToFront(unit)) return false;

            const player = getPlayer(gameState.currentPlayer);
            player.command -= 1;
            unit.moved = true;
            unit.position = 'front';
            updateFrontlineOwner();
            render();
            return true;
        }

        function attackAction(attackerId, targetType, targetUnitId = null) {
            const attacker = gameState.units.find(u => u.id === attackerId);
            if (!attacker || attacker.owner !== gameState.currentPlayer) return false;

            let targetUnit = null;
            if (targetType === 'unit' && targetUnitId !== null) {
                targetUnit = gameState.units.find(u => u.id === targetUnitId);
                if (!targetUnit) return false;
            }

            if (!canAttackTarget(attacker, targetType, targetUnit)) return false;
            if (getPlayer(gameState.currentPlayer).command < 1) return false;

            // 守护检查
            if (targetType === 'unit' && targetUnit) {
                if (isProtectedByGuard(targetUnit, attacker)) {
                    alert('目标被守护单位保护！');
                    return false;
                }
            }
            if (targetType === 'headquarter') {
                const opponent = 1 - attacker.owner;
                const guards = gameState.units.filter(u => u.owner === opponent && u.hasAbility('守护') && u.position === 'front');
                if (guards.length > 0 && attacker.type !== 'artillery') {
                    alert('敌方前线守护单位保护总部！');
                    return false;
                }
            }

            getPlayer(gameState.currentPlayer).command -= 1;
            attacker.attacked = true;

            if (targetType === 'unit' && targetUnit) {
                // 伏击
                const attackerDied = handleVigil(targetUnit, attacker);
                if (attackerDied) {
                    removeDeadUnits();
                    render();
                    return true;
                }
                targetUnit.health -= attacker.attack;
                if (attacker.type !== 'artillery' && targetUnit.health > 0) {
                    handleCounter(attacker, targetUnit);
                }
                removeDeadUnits();
            } else if (targetType === 'headquarter') {
                const opponentId = 1 - attacker.owner;
                gameState.players[opponentId].hp -= attacker.attack;
            }

            if (gameState.players[0].hp <= 0) alert('玩家1胜利！');
            else if (gameState.players[1].hp <= 0) alert('玩家0胜利！');

            updateFrontlineOwner();
            render();
            return true;
        }

        function endTurn() {
            const next = 1 - gameState.currentPlayer;
            gameState.currentPlayer = next;
            const player = gameState.players[next];
            if (player.maxCommand < 12) player.maxCommand++;
            player.command = player.maxCommand;
            gameState.units.forEach(u => u.resetTurn());
            render();
        }

        // ----- 拖拽逻辑 -----
        function setupDragDrop() {
            // 手牌拖拽
            document.querySelectorAll('.hand-card:not(.disabled)').forEach(card => {
                card.removeEventListener('touchstart', onHandDragStart);
                card.addEventListener('touchstart', onHandDragStart, { passive: false });
            });
            // 单位拖拽 (仅当前玩家单位)
            document.querySelectorAll('.unit-card').forEach(card => {
                const unitId = card.dataset.unitId;
                if (unitId) {
                    const unit = gameState.units.find(u => u.id == unitId);
                    if (unit && unit.owner === gameState.currentPlayer) {
                        card.removeEventListener('touchstart', onUnitDragStart);
                        card.addEventListener('touchstart', onUnitDragStart, { passive: false });
                    } else {
                        // 敌方单位不可拖拽
                        card.style.cursor = 'default';
                    }
                }
            });
        }

        // 手牌拖拽开始
        function onHandDragStart(e) {
            e.preventDefault();
            const card = e.currentTarget;
            const index = card.dataset.index;
            if (index === undefined) return;
            const player = gameState.players[0]; // 人类玩家固定0
            if (player.command < player.hand[index]?.cost) {
                alert('指挥点不足');
                return;
            }

            const touch = e.touches[0];
            dragState = {
                active: true,
                type: 'hand',
                startCardIndex: parseInt(index),
                startClientX: touch.clientX,
                startClientY: touch.clientY,
                originalElement: card,
                cloneElement: createClone(card, touch.clientX, touch.clientY),
            };
            card.classList.add('dragging');
            highlightDropZones('hand');
            bindDragEvents();
        }

        // 单位拖拽开始
        function onUnitDragStart(e) {
            e.preventDefault();
            const card = e.currentTarget;
            const unitId = card.dataset.unitId;
            if (!unitId) return;
            const unit = gameState.units.find(u => u.id == unitId);
            if (!unit || unit.owner !== gameState.currentPlayer) return;

            const touch = e.touches[0];
            dragState = {
                active: true,
                type: 'unit',
                startUnitId: parseInt(unitId),
                startClientX: touch.clientX,
                startClientY: touch.clientY,
                originalElement: card,
                cloneElement: createClone(card, touch.clientX, touch.clientY),
            };
            card.classList.add('dragging');
            highlightDropZones('unit', unit);
            bindDragEvents();
        }

        function createClone(original, x, y) {
            const clone = document.createElement('div');
            clone.className = 'drag-clone';
            clone.innerHTML = original.innerHTML;
            clone.style.left = x + 'px';
            clone.style.top = y + 'px';
            document.body.appendChild(clone);
            return clone;
        }

        function highlightDropZones(dragType, unit = null) {
            // 手牌只能部署到支援线
            if (dragType === 'hand') {
                document.getElementById('mySupportZone')?.classList.add('drop-highlight');
            } else if (dragType === 'unit' && unit) {
                // 单位：可移动到前线、攻击敌方单位、攻击总部
                if (unit.position === 'support' && canMoveToFront(unit)) {
                    document.getElementById('frontlineZone')?.classList.add('drop-highlight');
                }
                // 敌方单位高亮由 touchmove 动态处理，但我们可以高亮所有敌方单位卡片
                document.querySelectorAll('.unit-card').forEach(card => {
                    const uid = card.dataset.unitId;
                    if (uid) {
                        const targetUnit = gameState.units.find(u => u.id == uid);
                        if (targetUnit && targetUnit.owner !== gameState.currentPlayer) {
                            if (canAttackTarget(unit, 'unit', targetUnit)) {
                                card.classList.add('drop-highlight');
                            }
                        }
                    }
                });
                // 总部攻击区
                const hqTarget = document.querySelector('.headquarter-target');
                if (hqTarget && canAttackTarget(unit, 'headquarter')) {
                    hqTarget.classList.add('drop-highlight');
                }
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.drop-highlight').forEach(el => el.classList.remove('drop-highlight'));
        }

        function bindDragEvents() {
            document.addEventListener('touchmove', onDragMove, { passive: false });
            document.addEventListener('touchend', onDragEnd, { passive: false });
            document.addEventListener('touchcancel', onDragCancel, { passive: false });
        }

        function onDragMove(e) {
            if (!dragState.active) return;
            e.preventDefault();
            const touch = e.touches[0];
            if (dragState.cloneElement) {
                dragState.cloneElement.style.left = touch.clientX + 'px';
                dragState.cloneElement.style.top = touch.clientY + 'px';
            }
            // 动态高亮目标（可选，但为了性能，可暂不实现动态切换）
        }

        function onDragEnd(e) {
            if (!dragState.active) return;
            e.preventDefault();

            const touch = e.changedTouches[0];
            if (!touch) {
                cleanDrag();
                return;
            }

            // 获取落点元素
            const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
            if (!targetEl) {
                cleanDrag();
                return;
            }

            const dragType = dragState.type;
            let success = false;

            if (dragType === 'hand') {
                // 部署：检查落点是否在我方支援线
                const mySupport = document.getElementById('mySupportZone');
                if (mySupport && (targetEl === mySupport || mySupport.contains(targetEl))) {
                    success = deployCard(0, dragState.startCardIndex);
                }
            } else if (dragType === 'unit') {
                const attackerId = dragState.startUnitId;
                const attacker = gameState.units.find(u => u.id === attackerId);
                if (!attacker) { cleanDrag(); return; }

                // 1. 移动：落点在前线区域
                const frontlineZone = document.getElementById('frontlineZone');
                if (frontlineZone && (targetEl === frontlineZone || frontlineZone.contains(targetEl))) {
                    if (canMoveToFront(attacker)) {
                        success = moveUnit(attackerId);
                    }
                }
                // 2. 攻击敌方单位
                else {
                    // 向上查找单位卡片
                    let card = targetEl.closest('.unit-card');
                    if (card) {
                        const targetId = card.dataset.unitId;
                        if (targetId) {
                            const targetUnit = gameState.units.find(u => u.id == targetId);
                            if (targetUnit && targetUnit.owner !== attacker.owner) {
                                if (canAttackTarget(attacker, 'unit', targetUnit) && getPlayer(gameState.currentPlayer).command >= 1) {
                                    success = attackAction(attackerId, 'unit', parseInt(targetId));
                                }
                            }
                        }
                    }
                    // 3. 攻击总部
                    else {
                        const hqTarget = targetEl.closest('.headquarter-target');
                        if (hqTarget) {
                            if (canAttackTarget(attacker, 'headquarter') && getPlayer(gameState.currentPlayer).command >= 1) {
                                success = attackAction(attackerId, 'headquarter');
                            }
                        }
                    }
                }
            }

            if (!success) {
                // 简单的触感反馈
                // 可忽略
            }

            cleanDrag();
        }

        function onDragCancel(e) {
            cleanDrag();
        }

        function cleanDrag() {
            if (dragState.originalElement) {
                dragState.originalElement.classList.remove('dragging');
            }
            if (dragState.cloneElement) {
                dragState.cloneElement.remove();
            }
            clearHighlights();
            document.removeEventListener('touchmove', onDragMove);
            document.removeEventListener('touchend', onDragEnd);
            document.removeEventListener('touchcancel', onDragCancel);
            dragState.active = false;
        }

        // ----- 渲染 -----
        function render() {
            const container = document.getElementById('gameContainer');
            const p0 = gameState.players[0];
            const p1 = gameState.players[1];
            const current = gameState.currentPlayer;

            let html = `
                <div class="player-header">
                    <div class="player-badge">
                        <span>🔰 P1</span>
                        <div class="hp-command">
                            <span class="hp">❤️${p0.hp}</span>
                            <span class="command">⚡${p0.command}/${p0.maxCommand}</span>
                        </div>
                    </div>
                    <div class="turn-indicator">${current === 0 ? '▶️你的回合' : '⏸️敌方回合'}</div>
                    <div class="player-badge right">
                        <span>🔰 P2</span>
                        <div class="hp-command">
                            <span class="hp">❤️${p1.hp}</span>
                            <span class="command">⚡${p1.command}/${p1.maxCommand}</span>
                        </div>
                        <!-- 总部攻击目标区 -->
                        <div class="headquarter-target" data-target="headquarter">🏛️总部</div>
                    </div>
                </div>
                <div class="battlefield">
                    <!-- 敌方支援线 -->
                    <div class="row">
                        <div class="zone" id="enemySupportZone">
                            <div class="zone-label">敌方支援线</div>
                            ${renderUnitsInZone(1, 'support')}
                        </div>
                    </div>
                    <!-- 前线 -->
                    <div class="row">
                        <div class="zone" style="flex:2; background:#6f936f" id="frontlineZone">
                            <div class="zone-label">前线 · ${gameState.frontlineOwner === 0 ? '🔴我方' : (gameState.frontlineOwner === 1 ? '🔵敌方' : '⚫无人')}</div>
                            ${renderUnitsInZone(0, 'front')}
                            ${renderUnitsInZone(1, 'front')}
                        </div>
                    </div>
                    <!-- 我方支援线 -->
                    <div class="row">
                        <div class="zone" id="mySupportZone">
                            <div class="zone-label">我方支援线</div>
                            ${renderUnitsInZone(0, 'support')}
                        </div>
                    </div>
                </div>
                <div class="hand-area">
                    <div class="hand-title">📋 手牌 (拖拽部署)</div>
                    <div class="hand-cards" id="handContainer">
                        ${renderHand(0)}
                    </div>
                </div>
                <button class="end-turn-btn" id="endTurnBtn">⏭️ 结束回合</button>
                <div class="footer-info">
                    <span>⚡移动/攻击消耗1</span>
                    <span>🎴拖拽部署</span>
                </div>
            `;

            container.innerHTML = html;

            // 绑定结束回合
            document.getElementById('endTurnBtn').addEventListener('click', endTurn);

            // 设置拖拽
            setupDragDrop();
        }

        function renderUnitsInZone(owner, zone) {
            const units = gameState.units.filter(u => u.owner === owner && u.position === zone);
            if (units.length === 0) return '<div style="color:#aaa; padding:10px;">— 空 —</div>';
            return units.map(u => renderUnitCard(u)).join('');
        }

        function renderUnitCard(unit) {
            const abTags = unit.abilities.map(ab => `<span class="ability-tag">${ab}</span>`).join('');
            return `
                <div class="unit-card" data-unit-id="${unit.id}">
                    <div class="unit-name">${unit.name}</div>
                    <div class="unit-stats">⚔️${unit.attack} ❤️${unit.health}</div>
                    <div class="unit-abilities">${abTags}</div>
                </div>
            `;
        }

        function renderHand(playerId) {
            const player = gameState.players[playerId];
            if (!player.hand.length) return '<div>手牌空</div>';
            return player.hand.map((card, idx) => {
                const disabled = (player.command < card.cost) ? 'disabled' : '';
                return `
                    <div class="hand-card ${disabled}" data-index="${idx}">
                        <div>${card.name}</div>
                        <div>⚔️${card.attack} ❤️${card.health}</div>
                        <div class="hand-cost">⚡${card.cost}</div>
                        <div style="font-size:0.6rem;">${card.abilities.join(' ')}</div>
                    </div>
                `;
            }).join('');
        }

        // 启动
        initGame();
        function initGame() {
            gameState = {
                players: [
                    { id: 0, hp: 20, maxCommand: 1, command: 1, hand: [] },
                    { id: 1, hp: 20, maxCommand: 1, command: 1, hand: [] }
                ],
                currentPlayer: 0,
                frontlineOwner: null,
                units: [],
                nextUnitId: 1000,
            };
            for (let p = 0; p < 2; p++) {
                for (let i = 0; i < 5; i++) {
                    const cardTemplate = { ...cardLibrary[Math.floor(Math.random() * cardLibrary.length)] };
                    gameState.players[p].hand.push(cardTemplate);
                }
            }
            render();
        }
    })();
</script>
</body>
</html>
